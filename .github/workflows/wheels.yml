name: Build Wheels (Linux x86_64)

on:
  push:
    branches:
      - "main"
  workflow_dispatch:

jobs:
  wheels_linux_x86_64:
    name: manylinux wheels + smoke checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install cibuildwheel==2.21.3 build==1.3.0

      - name: Build code interpreter binary (host)
        run: |
          bash scripts/ci/prebuild_code_interpreter_linux_x86_64.sh responses

      - name: Build wheels (cibuildwheel)
        working-directory: responses
        env:
          CIBW_BUILD: "cp312-manylinux_x86_64"
          CIBW_ARCHS_LINUX: "x86_64"
          CIBW_REPAIR_WHEEL_COMMAND: ""

        run: |
          python -m cibuildwheel --output-dir wheelhouse

      - name: Build sdist
        working-directory: responses
        run: |
          python -m build --sdist --outdir dist

      - name: Artifact inspection (forbidden paths)
        working-directory: responses
        run: |
          set -euo pipefail
          echo "[inspect] wheels:"
          python -m zipfile -l wheelhouse/*.whl | grep -E "agentic_stack/tools/code_interpreter/(node_modules/|pyodide-.*\\.tar\\.bz2)" && exit 1 || true
          echo "[inspect] sdist:"
          tar -tzf dist/*.tar.gz | grep -E "agentic_stack/tools/code_interpreter/(node_modules/|pyodide-.*\\.tar\\.bz2)" && exit 1 || true

      - name: Minimal container smoke test (tar missing is actionable)
        working-directory: responses
        run: |
          set -euo pipefail
          docker run --rm \
            -v "$(pwd)/wheelhouse:/wheels:ro" \
            -v "$(pwd)/../scripts/ci:/scripts:ro" \
            python:3.12-slim \
            sh -lc 'python -m venv /tmp/venv && . /tmp/venv/bin/activate && pip install /wheels/*.whl && python /scripts/container_smoke_test.py'

      - name: Upload wheel artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wheelhouse-linux-x86_64
          path: responses/wheelhouse/*.whl

      - name: Upload sdist artifact
        uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: responses/dist/*.tar.gz
